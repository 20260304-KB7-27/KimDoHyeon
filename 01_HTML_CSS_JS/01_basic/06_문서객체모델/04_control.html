<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script스니펫</title>
    <script>
      window.onload = function () {
        for (let i = 0; i < 10; i++) {
          document.body.innerText += '<h1>Header - ' + i + ' </h1>';
        }

        for (let i = 0; i < 10; i++) {
          document.body.innerHTML += '<h1>Header - ' + i + ' </h1>';
        }
      };
    </script>
  </head>

  <body></body>
</html>
