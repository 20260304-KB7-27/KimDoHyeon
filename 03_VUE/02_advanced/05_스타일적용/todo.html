<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>:: TodoList App</h1>
      <!-- Todo 추가 -->
      <div>
        <!-- @keyup.enter : enter 키를 누르면 addTodo 함수 호출 -->
        <input
          type="text"
          v-model.trim="todo"
          @keyup.enter="addTodo"
          @keyup.ctrl.enter="addTodo"
        />
        <button @click="addTodo">추가</button>
      </div>

      <!-- Todo 목록 보여주기 -->
      <ul>
        <li
          v-for="todoitem in todolist"
          :key="todoitem.id"
          @click="toggleComplited(todoitem.id)"
        >
          <span
            :style="{textDecoration: todoitem.completed ? 'line-through' : 'none'}"
            >{{todoitem.todo}} {{todoitem.completed ? "[완료]" : ""}}</span
          >

          <!-- 삭제하기 -->
          <span @click="deleteTodo(todoitem.id)">삭제</span>
        </li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const todo = ref(''); // 새로 추가되는 todo
          let ts = new Date().getTime();

          const todolist = ref([
            { id: ts, todo: '자전거 타기', completed: false },
            { id: ts + 1, todo: '딸과 공원 산책', completed: true },
            { id: ts + 2, todo: '일요일 애견 카페', completed: false },
            { id: ts + 3, todo: 'Vue 원고 집필', completed: false },
          ]);

          // todo 삭제
          const deleteTodo = (id) => {
            console.log(`id : ${id}`);

            // finxIndex(콜백) : 콜백함수가 true를 번환하는 첫번째 요소의 인덱스를 반환
            let index = todolist.value.findIndex((item) => id === item.id);

            // splice(인덱스, 삭제할 요소의 갯수) : 인덱스부터 갯수만큼 배열의 요소를 삭제
            todolist.value.splice(index, 1);
          };

          // 완료상태 토글 가능
          const toggleComplited = (id) => {
            console.log(`id : ${id}`);

            // finxIndex(콜백) : 콜백함수가 true를 번환하는 첫번째 요소의 인덱스를 반환
            let index = todolist.value.findIndex((item) => id === item.id);

            todolist.value[index].completed = !todolist.value[index].completed;
          };

          // create todo
          const addTodo = (e) => {
            // 빈 문자열 예외처리
            if (todo.value === '') return;

            // 배열에 추가
            todolist.value.push({
              id: new Date().getTime(),
              todo: todo.value,
              completed: e.ctrlKey ? true : false,
            });

            // todo 초기화
            todo.value = '';
          };

          return { todo, todolist, deleteTodo, toggleComplited, addTodo };
        },
      }).mount('#app');
    </script>
  </body>
</html>
