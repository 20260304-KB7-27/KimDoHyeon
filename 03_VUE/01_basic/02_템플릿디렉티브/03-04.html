<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- input 이벤트리스터를 통해 바로 반영 -->
      <!-- 
      v-model
      - 폼 입력 요소와 Vue의 데이터를 양방향으로 바인딩해주는 디렉티브

      v-model 수식어
      1. .lazy : change이벤트가 발생 시에만 데이터를 업데이트
      2. .number: 사용자의 입력을 숫자로 형변환(형변환 불가 시, 원래값을 유지)
      3. .trim : 입력값의 앞뒤 공백을 자동으로 제거
       -->
      <input type="text" v-model.trim="name" />
      <div>입력한 값: {{name}}</div>
      <input type="text" v-model.lazy="num" />
      <br />
      <div>입력한 값: {{num}}</div>
      <input type="text" v-model.lazy="num1" />
      <br />
      <div>입력한 값: {{num1}}</div>
      <input type="text" v-model.lazy="num2" />
      <br />
      <div>입력한 값: {{num2}}</div>
      <br />
    </div>

    <script>
      const { createApp, ref } = Vue;
      // 반응형 데이터
      var vm = createApp({
        setup() {
          const name = ref("");
          const num = ref(0);
          const num1 = ref(0);
          const num2 = ref(0);
          // 이벤트핸들러 함수(v-model 없이 직접 이벤트를 연결할 때 쓰는 방식임)
          const changeName = (e) => {
            name.value = e.target.value;
          };
          // changeName 같은 함수 없이도 v-model이 다 처리해주기 때문에
          // num들이 알아서 .lazy로 잘 작동하는 것임.
          return {
            name,
            num,
            num1,
            num2,
            changeName,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
