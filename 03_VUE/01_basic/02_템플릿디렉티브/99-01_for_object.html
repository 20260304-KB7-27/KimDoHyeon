<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <!-- 
      v-for
      문법: v-for="(value, key, index) in 객체"  

      주의
      :key 속성을 필수적으로 등록!!
      인덱스값은 변할 수 있기 때문에 key로 사용하지 않는 것이 좋음.
      -->
    <div id="app">
      <ul>
        <li v-for="(value, key, index) in user" :key="index">
          {{index}} => {{key}} : {{value}}
        </li>
      </ul>
      <button @click="removeFirst">첫 번째 항목 삭제</button>
    </div>

    <script>
      const { createApp, ref } = Vue;

      var vm = createApp({
        setup() {
          const user = ref({
            name: "영희",
            age: 23,
            city: "서울",
          });
          const removeFirst = () => {
            const keys = Object.keys(user.value);
            delete user.value[keys[0]];
          };
          return { user, removeFirst };
        },
      }).mount("#app");
    </script>
  </body>
</html>
