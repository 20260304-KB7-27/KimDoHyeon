<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <style>
    .buttonColor {
      background-color: aqua;
      color: black;
    }
    .buttonLayout {
      text-align: center;
      width: 120px;
    }
    .staticBorder {
      border: khaki dashed 1px;
    }
  </style>
  <body>
    <div id="app">
      <input type="checkbox" v-model="isMyLayout" />레이아웃 적용 여부<br />
      <button class="staticBorder" :class="[myBtn, isMyLayout? myLayout:'' ]">
        버튼
      </button>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            myBtn: 'buttonColor',
            myLayout: 'buttonLayout',
            isMyLayout: false,
          };
        },
        methods: {},
      }).mount('#app');
    </script>
  </body>
</html>
