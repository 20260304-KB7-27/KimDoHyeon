<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <style>
    .btnColor {
      background-color: aqua;
      color: black;
    }
    .btnAlign {
      text-align: center;
      width: 120px;
    }
    .btnBorder {
      border: pink dashed 1px;
    }
  </style>
  <body>
    <div id="app">
      <!-- checkbox 클릭하면 true를 return함. -->
      <input type="checkbox" v-model="btnColor" />색상<br />
      <input type="checkbox" v-model="btnAlign" />정렬, 크기<br />
      <input type="checkbox" v-model="btnBorder" />테두리<br />

      <button :class="{btnColor, btnAlign, btnBorder}">버튼</button>
      <!-- 밑의 것을 축약한 게 위의 것 -->
      <button
        :class="{
            btnColor: btnColor,
            btnAlign: btnAlign, 
            btnBorder:btnBorder}"
      >
        버튼
      </button>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const btnColor = ref(false);
          const btnAlign = ref(false);
          const btnBorder = ref(false);
          return {
            btnColor,
            btnAlign,
            btnBorder,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
